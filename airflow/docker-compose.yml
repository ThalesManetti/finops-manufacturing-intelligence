# =============================================================================
# FinOps Manufacturing Intelligence — Docker Compose (Airflow)
# =============================================================================
# Configuração do Apache Airflow com:
#   - LocalExecutor (leve, ideal para desenvolvimento)
#   - PostgreSQL como metadata database
#   - Webserver na porta 8080
#   - Scheduler rodando junto
#   - Volume para DAGs, logs e credenciais GCP
# =============================================================================
# Uso:
#   docker compose up -d
#   Acesse: http://localhost:8080 (admin / admin)
# =============================================================================

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    &airflow-common-env
    # --- Airflow Core ---
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__TEST_CONNECTION: 'Enabled'

    # --- Database ---
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    # --- Webserver ---
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: America/Sao_Paulo

    # --- Scheduler ---
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 30

    # --- GCP ---
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/gcp-service-account.json
    GCP_PROJECT_ID: finops-manufacturing-2026
    GCS_BUCKET: finops-manufacturing-datalake-2026

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./credentials:/opt/airflow/credentials:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  # --- PostgreSQL (Metadata DB) ---
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    ports:
      - "5432:5432"

  # --- Airflow Init (roda uma vez para criar DB e user admin) ---
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Criar banco de dados
        airflow db init
        # Criar usuário admin
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@finops.local
        echo "Airflow inicializado com sucesso!"
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres:
        condition: service_healthy

  # --- Airflow Webserver ---
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  # --- Airflow Scheduler ---
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  postgres-db-volume:
